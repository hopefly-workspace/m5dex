# Nginx proxy for this project – /api/* → https://globaltradeapi.blockcryp.com/v1/*
# Use this inside a server { } block. Path rewrite: /api/foo → backend /v1/foo

location /api/ {
    proxy_pass https://globaltradeapi.blockcryp.com/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host globaltradeapi.blockcryp.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass_request_headers on;
    proxy_ssl_server_name on;
    proxy_ssl_verify on;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}
